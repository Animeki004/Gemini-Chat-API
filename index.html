                actionBar.innerHTML = actionsHTML;

                contentCol.appendChild(bubble);
                contentCol.appendChild(youtubeContainer);
                contentCol.appendChild(actionBar);
                
                container.appendChild(avatar);
                container.appendChild(contentCol);
                wrapper.appendChild(container);
                
                return { wrapper, contentNode: bubble, youtubeContainer, actionBar };
            }
        }

        function renderChat() {
            chatBox.innerHTML = '';
            
            if (messageHistory.length === 0) {
                emptyState.style.display = 'flex';
                return;
            }
            emptyState.style.display = 'none';

            messageHistory.forEach((msg, index) => {
                const isLastAI = msg.role === 'assistant' && index === messageHistory.length - 1;
                const nodeData = createBubbleNode(msg.role, isLastAI, index);
                
                if (msg.role === 'user') {
                    if (Array.isArray(msg.content)) {
                        let text = msg.content.find(c => c.type === 'text')?.text || '';
                        let html = '';
                        
                        const attachments = msg.content.filter(c => c.type === 'file_url' || c.type === 'image_url');
                        if (attachments.length > 0) {
                            html += `<div class="flex flex-wrap gap-2 mb-3 justify-end">`;
                            attachments.forEach(att => {
                                const url = att.file_url?.url || att.image_url?.url;
                                const name = att.file_url?.name || "image.jpg";
                                if (url.startsWith('data:image/')) {
                                    html += `<img src="${url}" onclick="openImageModal('${url}', '${name}')" class="h-20 object-contain rounded-lg border border-gray-700 cursor-pointer hover:opacity-90">`;
                                } else {
                                    const ext = (name.split('.').pop() || 'FILE').toUpperCase();
                                    html += `
                                        <div class="h-20 w-20 rounded-lg border border-gray-700 bg-gray-900 flex flex-col items-center justify-center p-2" title="${name}">
                                            <svg class="w-6 h-6 text-gray-400 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
                                            <span class="text-[10px] text-gray-300 font-mono truncate w-full text-center">${ext}</span>
                                        </div>
                                    `;
                                }
                            });
                            html += `</div>`;
                        }
                        
                        if (text) html += `<div>${text}</div>`;
                        nodeData.contentNode.innerHTML = html;
                    } else {
                        nodeData.contentNode.textContent = msg.content;
                    }
                } else {
                    // Pre-process citations dynamically to perfectly embed and highlight text natively
                    const processedText = embedInlineCitations(msg.content || '', msg.sources);
                    nodeData.contentNode.innerHTML = marked.parse(processedText);
                    
                    applyMonacoEditors(nodeData.contentNode);
                    
                    if (msg.images && msg.images.length > 0) {
                        const carouselId = `carousel-${index}`;
                        // FIXED: Isolated hover for image carousels using named group `group/carousel`
                        let carouselHTML = `<div class="mt-4 relative w-full max-w-lg rounded-xl overflow-hidden bg-[#0d0d0d] border border-gray-700 group/carousel shadow-lg">`;
                        
                        carouselHTML += `<div id="${carouselId}-track" class="flex transition-transform duration-300 ease-out" style="transform: translateX(0%); width: 100%;">`;
                        msg.images.forEach((img, i) => {
                            const url = img.url || img;
                            const title = (img.title || 'Image').replace(/'/g, "\\'"); 
                            carouselHTML += `<div class="w-full shrink-0 flex items-center justify-center p-2">
                                <img src="${url}" onclick="openImageModal('${url}', '${title}')" class="max-h-80 object-contain rounded-lg cursor-pointer hover:opacity-90 transition-opacity">
                            </div>`;
                        });
                        carouselHTML += `</div>`;
                        
                        if (msg.images.length > 1) {
                            carouselHTML += `
                                <button onclick="window.moveCarousel('${carouselId}', -1, ${msg.images.length})" class="absolute left-2 top-1/2 -translate-y-1/2 bg-black/60 text-white p-1.5 rounded-full hover:bg-black/80 opacity-0 group-hover/carousel:opacity-100 transition-opacity">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                                </button>
                                <button onclick="window.moveCarousel('${carouselId}', 1, ${msg.images.length})" class="absolute right-2 top-1/2 -translate-y-1/2 bg-black/60 text-white p-1.5 rounded-full hover:bg-black/80 opacity-0 group-hover/carousel:opacity-100 transition-opacity">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                                </button>
                                <div class="absolute bottom-3 left-1/2 -translate-x-1/2 flex gap-1.5 bg-black/40 px-2 py-1 rounded-full">
                            `;
                            msg.images.forEach((_, i) => {
                                carouselHTML += `<span id="${carouselId}-dot-${i}" class="w-2 h-2 rounded-full transition-colors shadow ${i === 0 ? 'bg-white' : 'bg-white/40'}"></span>`;
                            });
                            carouselHTML += `</div>`;
                        }
                        carouselHTML += `</div>`;
                        
                        nodeData.contentNode.insertAdjacentHTML('beforeend', carouselHTML);
                    }
                    
                    // Unified YouTube render trigger
                    updateYouTubeContainer(nodeData.youtubeContainer, nodeData.contentNode, msg.videos);
                }
                
                chatBox.appendChild(nodeData.wrapper);
            });
            
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // Action Routing for Send/Stop Button
        function handleSendAction() {
            if (isGenerating) {
                if (abortController) {
                    abortController.abort();
                    abortController = null;
                }
                setGeneratingState(false);
            } else {
                sendMessage();
            }
        }

        // Toggles Icons based on generation state
        function setGeneratingState(generating) {
            isGenerating = generating;
            const sendIcon = document.getElementById('sendIcon');
            const stopIcon = document.getElementById('stopIcon');
            
            if (generating) {
                sendBtn.classList.replace('bg-white', 'bg-gray-700');
                sendBtn.classList.replace('text-gray-900', 'text-white');
                sendIcon.classList.add('hidden');
                stopIcon.classList.remove('hidden');
                sendBtn.disabled = false; // Need to be clickable for stop
            } else {
                sendBtn.classList.replace('bg-gray-700', 'bg-white');
                sendBtn.classList.replace('text-white', 'text-gray-900');
                stopIcon.classList.add('hidden');
                sendIcon.classList.remove('hidden');
                updateSendButtonState();
            }
        }

        async function sendMessage() {
            const text = messageInput.value.trim();
            if (!text && selectedFiles.length === 0) return;
            
            // Auto stop mic if typed/sent manually
            stopMicrophone();

            let msgContent = text;
            if (selectedFiles.length > 0) {
                msgContent = [{ type: "text", text: text || "Analyze these files" }];
                selectedFiles.forEach(file => {
                    msgContent.push({
                        type: "file_url", 
                        file_url: { url: file.url, name: file.name } 
                    });
                });
            }

            // Input Reset
            messageInput.value = '';
            messageInput.style.height = 'auto';
            selectedFiles = [];
            renderAttachmentsPreview();

            messageHistory.push({ role: "user", content: msgContent });
            await triggerGenerationStream();
        }

        async function triggerGenerationStream() {
            const baseUrl = apiUrlInput.value.replace(/\/+$/, '');
            const apiKey = apiKeyInput.value.trim();
            const model = modelSelect.value;
            const useStream = streamToggle.checked;
            const sysPrompt = document.getElementById('systemPrompt').value.trim();

            if (!apiKey) return showToast("API Key is required");
            if (!model) return showToast("Select a model first");

            setGeneratingState(true);
            
            renderChat();

            const streamNode = createBubbleNode('assistant', false, messageHistory.length);
            streamNode.contentNode.innerHTML = `<div class="typing-indicator text-gray-400 flex gap-1 pt-2 pb-1">
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
            </div>`;
            streamNode.wrapper.classList.add('streaming-active');
            streamNode.actionBar.style.display = 'none'; 
            chatBox.appendChild(streamNode.wrapper);
            
            setTimeout(() => { chatBox.scrollTop = chatBox.scrollHeight; }, 50);
            
            let fullAssistantText = "";
            let assistantImages = [];
            let assistantVideos = [];
            let assistantSources = [];
            let hasStartedStreaming = false;

            abortController = new AbortController();

            try {
                // --- SMART INJECTION LOGIC ---
                const apiMessages = messageHistory.map((m, index) => {
                    // Only apply wrapper and system prompt to the LAST user message
                    if (m.role === 'user' && index === messageHistory.length - 1) {
                        let textContent = "";
                        const originalContent = JSON.parse(JSON.stringify(m.content)); // Deep clone
                        
                        if (Array.isArray(originalContent)) {
                            const txtObj = originalContent.find(c => c.type === 'text');
                            if (txtObj) textContent = txtObj.text;
                        } else {
                            textContent = originalContent;
                        }

                        let injectedPrompt = "";
                        
                        if (sysPrompt) {
                            injectedPrompt += `[SYSTEM INSTRUCTIONS]\n${sysPrompt}\n[/SYSTEM INSTRUCTIONS]\n\n`;
                        }
                        
                        if (isRegeneratingFlag) {
                            injectedPrompt += `[SYSTEM NOTE]\nThe user requested to REGENERATE the previous response. Please provide a new, improved, or alternative answer.\n[/SYSTEM NOTE]\n\n`;
                        } else if (isEditingFlag) {
                            injectedPrompt += `[SYSTEM NOTE]\nThe user has EDITED their previous message to branch off the conversation. Treat this as a new direction and provide a fresh, updated response based on this new request.\n[/SYSTEM NOTE]\n\n`;
                        }

                        if (injectedPrompt) {
                            injectedPrompt += `[USER REQUEST]\n${textContent}\n[/USER REQUEST]`;
                        } else {
                            injectedPrompt = textContent; // Fallback if no modifiers are present
                        }

                        // Reassemble payload safely
                        if (Array.isArray(originalContent)) {
                            const txtObj = originalContent.find(c => c.type === 'text');
                            if (txtObj) {
                                txtObj.text = injectedPrompt;
                            } else {
                                originalContent.push({ type: 'text', text: injectedPrompt });
                            }
                            return { role: 'user', content: originalContent };
                        } else {
                            return { role: 'user', content: injectedPrompt };
                        }
                    }
                    return { role: m.role, content: m.content };
                });

                const response = await fetch(`${baseUrl}/v1/chat/completions`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
                    body: JSON.stringify({
                        model: model,
                        messages: apiMessages,
                        stream: useStream,
                        temperature: 0.7
                    }),
                    signal: abortController.signal
                });

                if (!response.ok) {
                    const err = await response.json().catch(()=>({}));
                    throw new Error(err.detail || `HTTP error ${response.status}`);
                }

                if (useStream) {
                    const reader = response.body.getReader();
                    const decoder = new TextDecoder("utf-8");
                    
                    let autoScroll = true;
                    chatBox.addEventListener('scroll', () => {
                        autoScroll = chatBox.scrollHeight - chatBox.scrollTop <= chatBox.clientHeight + 50;
                    });

                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;
                        
                        const chunkStr = decoder.decode(value, { stream: true });
                        const lines = chunkStr.split('\n');
                        
                        for (let line of lines) {
                            line = line.trim();
                            if (line.startsWith('data: ')) {
                                const dataStr = line.slice(6);
                                if (dataStr === '[DONE]') break;
                                
                                try {
                                    const dataObj = JSON.parse(dataStr);
                                    const delta = dataObj.choices[0].delta;
                                    
                                    if (delta.content) {
                                        if (!hasStartedStreaming) {
                                            streamNode.contentNode.innerHTML = '';
                                            hasStartedStreaming = true;
                                        }
                                        
                                        fullAssistantText += delta.content;
                                        
                                        // Process live citations directly into streaming text
                                        const processedLiveText = embedInlineCitations(fullAssistantText, assistantSources);
                                        streamNode.contentNode.innerHTML = marked.parse(processedLiveText);
                                        
                                        // Unified YouTube trigger handles extraction live
                                        updateYouTubeContainer(streamNode.youtubeContainer, streamNode.contentNode, assistantVideos);
                                        
                                        if (autoScroll) chatBox.scrollTop = chatBox.scrollHeight;
                                    }
                                    
                                    if (delta.images && delta.images.length > 0) {
                                        delta.images.forEach(img => {
                                            const imgUrl = typeof img === 'string' ? img : img.url;
                                            if (!assistantImages.find(e => (typeof e === 'string' ? e : e.url) === imgUrl)) {
                                                assistantImages.push(img);
                                            }
                                        });
                                    }
                                    if (delta.videos && delta.videos.length > 0) {
                                        delta.videos.forEach(vid => {
                                            if (!assistantVideos.find(e => e.video_id === vid.video_id)) {
                                                assistantVideos.push(vid);
                                            }
                                        });
                                    }
                                    if (delta.sources && delta.sources.length > 0) {
                                        delta.sources.forEach(src => {
                                            if (!assistantSources.find(e => e.url === src.url)) {
                                                assistantSources.push(src);
                                            }
                                        });
                                    }
                                } catch (e) { } 
                            }
                        }
                    }
                } else {
                    const data = await response.json();
                    const msg = data.choices[0].message;
                    fullAssistantText = msg.content || "";
                    assistantImages = msg.images || [];
                    assistantVideos = msg.videos || [];
                    assistantSources = msg.sources || [];
                }

                messageHistory.push({ role: "assistant", content: fullAssistantText, images: assistantImages, videos: assistantVideos, sources: assistantSources });
                saveChatState();

            } catch (error) {
                if (error.name === 'AbortError') {
                    if (fullAssistantText) {
                        messageHistory.push({ role: "assistant", content: fullAssistantText + "\n\n*[Response stopped by user]*", images: assistantImages, videos: assistantVideos, sources: assistantSources });
                        saveChatState();
                    }
                } else {
                    showToast(error.message);
                    if (messageHistory.length > 0 && messageHistory[messageHistory.length - 1].role === 'user') {
                        messageHistory.pop();
                    }
                    saveChatState();
                }
            } finally {
                setGeneratingState(false);
                abortController = null;
                isRegeneratingFlag = false; // Reset flag
                isEditingFlag = false; // Reset flag
                messageInput.focus();
                
                // Final re-render safely locks everything into place
                renderChat();
            }
        }

        function clearChat() {
            messageHistory = [];
            localStorage.removeItem('chatHistory');
            closeSidePlayer();
            renderChat();
        }
    </script>
</body>
