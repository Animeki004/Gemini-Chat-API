<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Modern API Tester</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], mono: ['ui-monospace', 'SFMono-Regular', 'Menlo', 'Monaco', 'Consolas', 'monospace'] },
                    colors: {
                        gray: {
                            800: '#2f2f2f',
                            850: '#212121',
                            900: '#171717',
                            950: '#0d0d0d'
                        }
                    }
                }
            }
        }
    </script>

    <!-- Marked.js for Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #212121; color: #ececec; overflow: hidden; }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background-color: #424242; border-radius: 9999px; }
        ::-webkit-scrollbar-thumb:hover { background-color: #4f4f4f; }

        /* Professional Markdown Styling */
        .markdown-body { font-size: 1rem; line-height: 1.65; word-wrap: break-word; color: #ececec; }
        .markdown-body p { margin-bottom: 1rem; }
        .markdown-body p:last-child { margin-bottom: 0; }
        .markdown-body h1, .markdown-body h2, .markdown-body h3, .markdown-body h4 { color: #ffffff; font-weight: 600; margin-top: 1.5rem; margin-bottom: 0.75rem; }
        .markdown-body h1 { font-size: 1.5rem; } .markdown-body h2 { font-size: 1.25rem; }
        
        /* Pre-Monaco Code Blocks */
        .markdown-body pre { background-color: #0d0d0d; border: 1px solid #333; padding: 1rem; border-radius: 0.75rem; overflow-x: auto; margin: 1rem 0; font-family: 'ui-monospace', monospace; }
        .markdown-body pre code { background-color: transparent; padding: 0; font-size: 0.875rem; color: #e5e7eb; }
        
        /* Inline Code */
        .markdown-body code { font-family: 'ui-monospace', monospace; background-color: #333; padding: 0.2rem 0.4rem; border-radius: 0.375rem; font-size: 0.85em; color: #ececec; }
        
        /* Dotted Link Styling */
        .markdown-body a { 
            color: #60a5fa; 
            text-decoration: none; 
            border-bottom: 1px dotted #60a5fa; 
            transition: all 0.2s; 
            padding-bottom: 1px;
        }
        .markdown-body a:hover { 
            color: #93c5fd; 
            border-bottom-color: #93c5fd; 
        }

        .markdown-body strong { color: #ffffff; font-weight: 600; }
        
        .markdown-body ul { list-style-type: disc; padding-left: 1.5rem; margin-bottom: 1rem; }
        .markdown-body ol { list-style-type: decimal; padding-left: 1.5rem; margin-bottom: 1rem; }
        .markdown-body li { margin-bottom: 0.25rem; }
        
        .markdown-body blockquote { border-left: 3px solid #4f4f4f; padding-left: 1rem; color: #a1a1aa; font-style: italic; margin: 1rem 0; }
        .markdown-body table { width: 100%; border-collapse: collapse; margin: 1rem 0; }
        .markdown-body th, .markdown-body td { border: 1px solid #424242; padding: 0.5rem 0.75rem; text-align: left; }
        .markdown-body th { background-color: #2f2f2f; color: #ffffff; font-weight: 600; }

        /* Modern Pulsing AI Cursor for Streaming */
        .streaming-active .markdown-body *:last-child::after { 
            content: ''; 
            display: inline-block;
            width: 10px;
            height: 10px;
            background-color: #ececec;
            border-radius: 50%;
            margin-left: 6px;
            vertical-align: middle;
            transform: translateY(-1px);
            animation: ai-pulse 0.7s ease-in-out infinite alternate; 
        }
        @keyframes ai-pulse {
            0% { opacity: 1; }
            100% { opacity: 0.2; }
        }

        /* Beautiful Three Dot Typing Indicator */
        .typing-indicator {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 8px 4px;
        }
        .typing-dot {
            width: 6px;
            height: 6px;
            background-color: #a1a1aa;
            border-radius: 50%;
            animation: typing-bounce 1.4s infinite ease-in-out both;
        }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes typing-bounce {
            0%, 80%, 100% { transform: scale(0); opacity: 0.4; }
            40% { transform: scale(1); opacity: 1; }
        }

        /* Sidebar transitions */
        .sidebar-transition { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }

        /* Hide Scrollbar for Carousels */
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

        /* Mic Recording Pulse Animation */
        .mic-recording {
            animation: mic-pulse 1.5s infinite;
            color: #ef4444 !important; /* Tailwind Red 500 */
        }
        @keyframes mic-pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }

        /* ============================================================== */
        /* NATIVE GEMINI INLINE CITATION HOVER LOGIC                      */
        /* ============================================================== */
        
        .gemini-source-wrapper {
            position: relative;
            display: inline;
        }
        .gemini-source-text {
            transition: background-color 0.2s, color 0.2s;
            border-radius: 4px;
            cursor: default; /* Not a link by default */
        }
        
        /* MAGIC: Only highlight the text when specifically hovering the grey pill */
        .gemini-source-wrapper:has(.gemini-source-pill:hover) .gemini-source-text {
            background-color: #1a2b4c;
            color: #a8c7fa;
        }
        
        .gemini-source-pill {
            display: inline-block;
            margin-left: 0.25rem;
            position: relative;
            vertical-align: middle;
            transform: translateY(-2px);
            cursor: default; /* Grey pill itself is not the link */
        }
        
        .gemini-source-tooltip {
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            margin-bottom: 0.5rem;
            opacity: 0;
            visibility: hidden;
            transition: all 0.2s ease-in-out;
            width: 16rem;
            background-color: #1e1e1e;
            border: 1px solid #374151; /* gray-700 */
            border-radius: 0.75rem;
            padding: 0.75rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.4);
            z-index: 9999;
            white-space: normal;
            text-align: left;
            display: flex;
            flex-direction: column;
            cursor: pointer;
            text-decoration: none !important;
            pointer-events: none; /* Crucial: Don't block interactions when invisible */
            border-bottom: none !important; /* Override dotted line for tooltips */
        }
        
        /* Transparent bridge so hover doesn't break when moving mouse to the tooltip */
        .gemini-source-tooltip::before {
            content: '';
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            height: 1.5rem;
            background: transparent;
        }

        /* Triangle Arrow Pointing Down */
        .gemini-source-tooltip::after {
            content: '';
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            border-width: 6px;
            border-style: solid;
            border-color: #1e1e1e transparent transparent transparent;
        }
        
        /* Trigger reveal AND enable clicks when hovered */
        .gemini-source-pill:hover .gemini-source-tooltip {
            opacity: 1;
            visibility: visible;
            pointer-events: auto; /* Enable clicking */
        }
    </style>
</head>
<body class="flex h-screen w-full bg-gray-850">

    <!-- Mobile Sidebar Overlay -->
    <div id="mobileOverlay" class="fixed inset-0 bg-black/60 z-30 hidden backdrop-blur-sm transition-opacity" onclick="toggleSidebar()"></div>

    <!-- Sidebar Configuration -->
    <aside id="sidebar" class="fixed md:static inset-y-0 left-0 z-40 w-72 bg-gray-900 border-r border-gray-800 flex flex-col transform -translate-x-full md:translate-x-0 sidebar-transition h-full shrink-0">
        
        <div class="p-4 flex items-center justify-between">
            <button onclick="clearChat()" class="flex-1 flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-gray-800 text-gray-200 font-medium transition-colors border border-gray-700/50 hover:border-gray-600">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                New Chat
            </button>
            <button onclick="toggleSidebar()" class="md:hidden ml-2 p-2.5 text-gray-400 hover:text-white rounded-lg hover:bg-gray-800">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
        </div>
        
        <div class="px-4 py-2 mt-4 space-y-5 flex-1 overflow-y-auto">
            <h2 class="text-xs font-semibold text-gray-500 uppercase tracking-wider pl-1">Configuration</h2>
            
            <div class="space-y-1.5">
                <label class="text-xs text-gray-400 pl-1">API Base URL</label>
                <input type="text" id="apiUrl" value="http://localhost:8000" class="w-full px-3 py-2.5 bg-gray-800 border border-gray-700 rounded-lg focus:outline-none focus:border-gray-500 text-sm text-gray-200 placeholder-gray-500 transition-colors">
            </div>
            
            <div class="space-y-1.5">
                <label class="text-xs text-gray-400 pl-1">API Key</label>
                <input type="password" id="apiKey" placeholder="sk-..." class="w-full px-3 py-2.5 bg-gray-800 border border-gray-700 rounded-lg focus:outline-none focus:border-gray-500 text-sm text-gray-200 placeholder-gray-500 transition-colors">
            </div>

            <!-- Enhanced: System Prompt Configuration -->
            <div class="space-y-1.5 pt-2">
                <label class="text-xs text-gray-400 pl-1 flex justify-between items-center">
                    System Prompt
                    <span class="text-[10px] text-gray-500 font-normal border border-gray-700 px-1.5 rounded">Injected</span>
                </label>
                <textarea id="systemPrompt" rows="3" placeholder="You are a helpful AI assistant..." class="w-full px-3 py-2.5 bg-gray-800 border border-gray-700 rounded-lg focus:outline-none focus:border-gray-500 text-sm text-gray-200 placeholder-gray-500 transition-colors resize-y min-h-[80px]"></textarea>
            </div>

            <!-- Stream Toggle Section -->
            <div class="space-y-1.5 pt-4 border-t border-gray-800">
                <label class="flex items-center gap-2 cursor-pointer text-sm text-gray-300 pl-1 group">
                    <input type="checkbox" id="streamToggle" class="w-4 h-4 rounded bg-gray-800 border-gray-700 text-blue-500 focus:ring-blue-600 focus:ring-offset-gray-900 transition-colors">
                    <span class="group-hover:text-white transition-colors">Stream Responses</span>
                </label>
            </div>
        </div>
        
        <div class="p-4 border-t border-gray-800">
            <div class="flex items-center gap-3 px-2">
                <div class="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center text-white font-bold text-sm">
                    U
                </div>
                <div class="text-sm font-medium text-gray-200">User Session</div>
            </div>
        </div>
    </aside>

    <!-- Main Chat Workspace -->
    <main class="flex-1 flex flex-col h-full min-w-0 bg-gray-850 relative transition-all duration-300">
        
        <!-- Top Navigation Bar -->
        <header class="h-14 shrink-0 flex items-center justify-between px-4 border-b border-gray-800/60 bg-gray-850/90 backdrop-blur-sm sticky top-0 z-20">
            <div class="w-12 flex items-center">
                <button onclick="toggleSidebar()" class="text-gray-400 hover:text-white p-2 rounded-lg hover:bg-gray-800 transition-colors">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                </button>
            </div>
            
            <!-- Central Model Selector -->
            <div class="flex-1 flex justify-center">
                <div class="relative group flex items-center">
                    <select id="modelSelect" class="appearance-none bg-transparent hover:bg-gray-800 text-gray-200 font-medium py-1.5 pl-4 pr-9 rounded-xl cursor-pointer focus:outline-none transition-colors text-[15px] border border-transparent hover:border-gray-700" disabled>
                        <option value="">Select a model</option>
                    </select>
                    <svg class="w-4 h-4 text-gray-400 absolute right-3 pointer-events-none group-hover:text-gray-200 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                </div>
            </div>
            
            <div class="w-12 flex justify-end">
                <button onclick="fetchModels()" id="fetchBtnTop" class="text-gray-400 hover:text-white p-2 rounded-lg hover:bg-gray-800 transition-colors" title="Refresh Models">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                </button>
            </div>
        </header>

        <!-- Chat Container (Scrollable Area) -->
        <div id="chatBox" class="flex-1 overflow-y-auto px-4 md:px-0 py-6 scroll-smooth">
            <!-- Content gets injected here by renderChat() -->
        </div>

        <!-- Empty State Placeholder -->
        <div id="emptyState" class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none pb-20 z-0">
            <div class="w-16 h-16 rounded-full bg-white flex items-center justify-center shadow-lg mb-6">
                <svg class="w-10 h-10 text-gray-900" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-1-12h2v6h-2zm0 8h2v2h-2z"/></svg>
            </div>
            <h2 class="text-2xl font-semibold text-gray-200">How can I help you today?</h2>
        </div>

        <!-- Input Area -->
        <div class="shrink-0 px-4 md:px-8 pb-6 pt-2 bg-gradient-to-t from-gray-850 via-gray-850 to-transparent">
            <div class="max-w-3xl mx-auto w-full relative">
                
                <!-- Multi-File Attachment Preview Container -->
                <div id="attachmentsPreview" class="hidden absolute bottom-full mb-3 left-0 bg-gray-800 border border-gray-700 rounded-xl p-3 shadow-xl z-10 w-full max-w-full overflow-x-auto flex gap-3 scroll-smooth">
                    <!-- Files injected dynamically -->
                </div>

                <!-- Input Box Container -->
                <div class="relative flex items-end bg-gray-800 rounded-2xl shadow-lg border border-gray-700 focus-within:border-gray-500 transition-colors">
                    
                    <input type="file" id="fileInput" multiple accept="*/*" class="hidden" onchange="handleFileUpload(event)">
                    
                    <!-- Left action icons container -->
                    <div class="flex items-center pb-1 pl-1">
                        <button type="button" onclick="document.getElementById('fileInput').click()" class="p-3 text-gray-400 hover:text-gray-200 transition-colors rounded-full flex-shrink-0" title="Attach Files">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"></path></svg>
                        </button>
                        
                        <!-- New Speech to Text Microphone Button -->
                        <button type="button" id="micBtn" onclick="toggleMicrophone()" class="p-3 text-gray-400 hover:text-gray-200 transition-colors rounded-full flex-shrink-0" title="Dictate prompt">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M19 11v1a7 7 0 01-14 0v-1M12 4a3 3 0 00-3 3v4a3 3 0 106 0V7a3 3 0 00-3-3z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M12 19v3"></path></svg>
                        </button>
                    </div>

                    <textarea id="messageInput" rows="1" placeholder="Message the AI..." class="w-full py-3.5 px-1 bg-transparent focus:outline-none text-gray-100 placeholder-gray-400 resize-none max-h-48 overflow-y-auto leading-relaxed"></textarea>
                    
                    <button type="button" onclick="handleSendAction()" id="sendBtn" class="p-2 mb-2 mr-2 rounded-xl bg-white text-gray-900 hover:bg-gray-200 transition-colors disabled:opacity-30 disabled:bg-gray-600 disabled:text-gray-400 disabled:cursor-not-allowed shadow-sm flex items-center justify-center h-9 w-9 shrink-0">
                        <!-- Send Icon -->
                        <svg id="sendIcon" class="w-5 h-5 translate-y-[1px] -translate-x-[1px]" fill="currentColor" viewBox="0 0 24 24"><path d="M3.478 2.404a.75.75 0 00-.926.941l2.432 7.905H13.5a.75.75 0 010 1.5H4.984l-2.432 7.905a.75.75 0 00.926.94 60.519 60.519 0 0018.445-8.986.75.75 0 000-1.218A60.517 60.517 0 003.478 2.404z"></path></svg>
                        <!-- Stop Icon (Hidden by default) -->
                        <svg id="stopIcon" class="w-4 h-4 hidden" fill="currentColor" viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12" rx="2"></rect></svg>
                    </button>
                </div>
                <div class="text-center mt-2.5">
                    <p class="text-[11px] text-gray-500">AI can make mistakes. Consider verifying important information.</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Side Player Panel -->
    <aside id="sidePlayerPanel" class="w-0 shrink-0 overflow-hidden bg-[#171717] border-l border-gray-800 flex flex-col absolute right-0 md:relative h-full transition-all duration-300 z-30 shadow-2xl">
        <div class="flex items-center justify-between p-3.5 border-b border-gray-800 bg-gray-900">
            <div class="flex items-center gap-2 overflow-hidden pr-2">
                <svg class="w-5 h-5 text-red-500 shrink-0" fill="currentColor" viewBox="0 0 24 24"><path d="M19.615 3.184c-3.604-.246-11.631-.245-15.23 0-3.897.266-4.356 2.62-4.385 8.816.029 6.185.484 8.549 4.385 8.816 3.6.245 11.626.246 15.23 0 3.897-.266 4.356-2.62 4.385-8.816-.029-6.185-.484-8.549-4.385-8.816zm-10.615 12.816v-8l8 3.993-8 4.007z"/></svg>
                <h3 id="sidePlayerTitle" class="text-sm font-semibold text-gray-200 truncate">Video Player</h3>
            </div>
            <button onclick="closeSidePlayer()" class="text-gray-400 hover:text-white p-2 rounded-lg hover:bg-gray-800 shrink-0 transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
        </div>
        <div class="flex-1 w-full flex flex-col bg-black">
            <div class="w-full aspect-video bg-black relative shadow-lg">
                <iframe id="sidePlayerIframe" class="w-full h-full border-0 absolute top-0 left-0" src="" allowfullscreen allow="autoplay; encrypted-media"></iframe>
            </div>
            <div id="sidePlayerDetails" class="p-5 flex-1 overflow-y-auto bg-gray-900">
                <h2 id="sidePlayerDescTitle" class="text-lg font-bold text-gray-100 mb-2 leading-tight"></h2>
                <p id="sidePlayerChannel" class="text-sm font-medium text-gray-400 mb-4 flex items-center gap-1.5"></p>
                <div class="h-[1px] w-full bg-gray-800 my-4"></div>
                <p class="text-[13px] text-gray-400">Interact with the chat while watching your video seamlessly.</p>
            </div>
        </div>
    </aside>

    <!-- Fullscreen Image Preview Modal -->
    <div id="fullscreenModal" class="fixed inset-0 z-[100] hidden flex-col items-center justify-center bg-black/90 backdrop-blur-md opacity-0 transition-opacity duration-300">
        <!-- Clickable background to close -->
        <div class="absolute inset-0 z-0" onclick="closeImageModal()"></div>
        
        <div class="absolute top-4 right-4 flex gap-3 z-10">
            <button id="downloadModalBtn" class="p-2.5 bg-gray-800/80 text-white rounded-xl hover:bg-gray-700 transition-colors border border-gray-700" title="Download Image">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
            </button>
            <button onclick="closeImageModal()" class="p-2.5 bg-gray-800/80 text-white rounded-xl hover:bg-gray-700 transition-colors border border-gray-700" title="Close Preview">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
        </div>
        
        <img id="fullscreenImage" src="" class="max-w-[95vw] max-h-[90vh] object-contain rounded-lg shadow-2xl scale-95 transition-transform duration-300 z-10 pointer-events-none">
    </div>

    <!-- Notifications Toast -->
    <div id="toast" class="fixed top-5 left-1/2 transform -translate-x-1/2 -translate-y-20 opacity-0 bg-gray-800 text-gray-100 px-4 py-2.5 rounded-lg shadow-2xl border border-gray-700 transition-all duration-300 z-50 flex items-center gap-2.5">
        <div id="toastIcon" class="w-2 h-2 rounded-full"></div>
        <span id="toastMessage" class="text-sm font-medium"></span>
    </div>

    <!-- Monaco Editor Logic & MARKED.JS CUSTOM RENDERER -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.min.js"></script>
    <script>
        let monacoThemeDefined = false;

        require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs' } });
        require(['vs/editor/editor.main'], function() {
            monaco.editor.defineTheme('modern-dark', {
                base: 'vs-dark',
                inherit: true,
                rules: [{ background: '0d0d0d' }],
                colors: {
                    'editor.background': '#0d0d0d', 
                    'editor.lineHighlightBackground': '#1a1a1a', 
                    'editorLineNumber.foreground': '#6b7280', 
                    'editorIndentGuide.background': '#374151', 
                    'editor.selectionBackground': '#2563eb50' 
                }
            });
            monacoThemeDefined = true;
        });

        // ==========================================
        // SMART NATIVE GEMINI CITATION RENDERER
        // ==========================================
        const renderer = new marked.Renderer();
        renderer.link = function(href, title, text) {
            // FIX 1: Safely protect against Marked.js v13+ passing a single token object
            if (href !== null && typeof href === 'object') {
                text = href.text || '';
                title = href.title || '';
                href = href.href || '';
            }
            
            // FIX 2: Safely cast to string to prevent `.trim()` crashes during streaming
            text = String(text || ''); 
            title = String(title || '');
            href = String(href || '');

            let domain = '';
            try { domain = new URL(href).hostname.replace('www.', ''); } catch(e){}
            
            const isCitationNum = /^\[?\d+\]?$/.test(text) || text.trim().toLowerCase() === 'source';
            
            if (isCitationNum) {
                // Pill is NOT a link. Tooltip IS the link.
                return `<span class="gemini-source-pill"><span class="inline-flex items-center gap-1 bg-[#1a1a1a] hover:bg-[#252525] border border-gray-700/60 px-2 py-[2px] rounded-full transition-colors cursor-default"><span class="text-[10px] font-medium text-gray-400 hover:text-gray-200">${domain}</span></span><a href="${href}" target="_blank" class="gemini-source-tooltip hover:border-gray-500 hover:bg-[#252525] transition-colors"><span class="flex items-center gap-2 mb-1.5"><img src="https://www.google.com/s2/favicons?domain=${domain}&sz=32" class="w-4 h-4 rounded-sm bg-white shrink-0"><span class="text-[11px] text-gray-400 font-medium truncate">${domain}</span></span><span class="text-[13px] text-gray-100 font-medium line-clamp-3 leading-snug break-words">${title || domain}</span></a></span>`;
            } else {
                // Returns a clean tag so the custom CSS dotted line perfectly applies 
                return `<a href="${href}" target="_blank">${text}</a>`;
            }
        };
        marked.use({ renderer });

        // =========================================================================
        // NATIVE INLINE HIGHLIGHTING ALGORITHM (MATCHING GEMINI UI)
        // =========================================================================
        function embedInlineCitations(rawContent, sources) {
            if (!rawContent || !sources || sources.length === 0) return rawContent;
            
            let processed = rawContent;
            let unmatchedSources = [];
            
            sources.forEach(src => {
                let matched = false;
                let domain = '';
                try { domain = new URL(src.url).hostname.replace('www.', ''); } catch(e){}
                let safeTitle = (src.title || '').replace(/"/g, '&quot;');
                
                // Pure CSS isolation: The grey pill is just a span. The tooltip inside is the clickable <a>
                const pillHTML = `<span class="gemini-source-pill"><span class="inline-flex items-center bg-[#282a2c] hover:bg-[#343638] border border-gray-700/50 px-2 py-[2px] rounded-full transition-colors cursor-default"><span class="text-[10px] font-medium text-[#c4c7c5] hover:text-white truncate max-w-[100px]">${domain}</span></span><a href="${src.url}" target="_blank" class="gemini-source-tooltip hover:border-gray-500 hover:bg-[#252525] transition-colors"><span class="flex items-center gap-2 mb-1.5"><img src="https://www.google.com/s2/favicons?domain=${domain}&sz=32" class="w-4 h-4 rounded-sm bg-white shrink-0"><span class="text-[11px] text-gray-400 font-medium truncate">${domain}</span></span><span class="text-[13px] text-gray-100 font-medium line-clamp-3 leading-snug break-words">${safeTitle}</span></a></span>`;

                if (src.snippet && src.snippet.length > 3) {
                    const cleanSnippet = src.snippet.replace(/[*_~`]/g, '').trim();
                    
                    // Wraps the text and the pill inside the CSS tracker wrapper
                    if (processed.includes(src.snippet)) {
                        processed = processed.replace(src.snippet, `<span class="gemini-source-wrapper"><span class="gemini-source-text">${src.snippet}</span>${pillHTML}</span>`);
                        matched = true;
                    } 
                    else if (processed.includes(cleanSnippet)) {
                        processed = processed.replace(cleanSnippet, `<span class="gemini-source-wrapper"><span class="gemini-source-text">${cleanSnippet}</span>${pillHTML}</span>`);
                        matched = true;
                    }
                }
                
                if (!matched) {
                    unmatchedSources.push({src, tooltipHTML: pillHTML});
                }
            });
            
            // Elegantly distribute unmapped fallback sources
            if (unmatchedSources.length > 0) {
                let sentences = processed.split(/([.!?](?:\s+|$))/);
                if (sentences.length > 1) {
                    unmatchedSources.forEach((item, idx) => {
                        let targetIdx = (idx * 2);
                        if (targetIdx >= sentences.length) targetIdx = sentences.length > 2 ? sentences.length - 2 : 0; 
                        
                        // FIX: Just seamlessly append the pill to the end of the sentence.
                        // We DO NOT wrap the sentence in .gemini-source-wrapper, preventing the whole block from turning blue on hover.
                        sentences[targetIdx] = `${sentences[targetIdx]} ${item.tooltipHTML}`;
                    });
                    processed = sentences.join('');
                } else {
                    unmatchedSources.forEach(item => {
                        processed += ` ${item.tooltipHTML}`;
                    });
                }
            }
            
            return processed;
        }

        function fallbackCopyTextToClipboard(text) {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.position = "fixed";
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            try { document.execCommand('copy'); } catch (err) {}
            document.body.removeChild(textArea);
        }

        // =========================================================================
        // GEMINI CLONE - YOUTUBE BOTTOM ATTACHMENT RENDERING
        // =========================================================================
        window.ytMetadataCache = window.ytMetadataCache || {};

        function extractYTId(url) {
            try {
                if (url.includes('youtube.com/watch')) return new URL(url).searchParams.get('v');
                if (url.includes('youtu.be/')) return url.split('youtu.be/')[1].split('?')[0];
            } catch(e) {}
            return null;
        }

        async function updateYouTubeContainer(ytContainer, contentNode, apiVideos = []) {
            let videoMap = new Map();

            // 1. Prioritize any explicitly passed msg.videos from the API
            if (apiVideos) {
                apiVideos.forEach(vid => {
                    if (vid.video_id) {
                        videoMap.set(vid.video_id, {
                            id: vid.video_id,
                            title: vid.title,
                            channel: vid.channel,
                            thumbnail: vid.thumbnail || `https://img.youtube.com/vi/${vid.video_id}/hqdefault.jpg`,
                            description: vid.description,
                            url: vid.url || `https://www.youtube.com/watch?v=${vid.video_id}`,
                            loaded: true
                        });
                    }
                });
            }

            // 2. Discover dynamically generated links in the markdown text
            const links = contentNode.querySelectorAll('a[href*="youtube.com/watch"], a[href*="youtu.be/"]');
            links.forEach(link => {
                if (link.closest('.gemini-source-pill')) return; // ignore reference pills
                
                const vidId = extractYTId(link.href);
                if (vidId && !videoMap.has(vidId)) {
                    if (window.ytMetadataCache[vidId]) {
                        videoMap.set(vidId, window.ytMetadataCache[vidId]);
                    } else {
                        // Insert placeholder logic & trigger async fetch immediately
                        videoMap.set(vidId, { id: vidId, url: link.href, loaded: false });
                        
                        fetch(`https://noembed.com/embed?url=${encodeURIComponent(link.href)}`)
                            .then(res => res.json())
                            .then(data => {
                                window.ytMetadataCache[vidId] = {
                                    id: vidId,
                                    title: data.title || link.textContent || 'YouTube Video',
                                    channel: data.author_name || 'YouTube',
                                    thumbnail: data.thumbnail_url || `https://img.youtube.com/vi/${vidId}/hqdefault.jpg`,
                                    // ADDED: Dynamically generate description fallback
                                    description: data.description || `Watch this featured video from ${data.author_name || 'YouTube'} directly in the side player. Discover more insights and related content.`,
                                    url: link.href,
                                    loaded: true
                                };
                                updateYouTubeContainer(ytContainer, contentNode, apiVideos); // Re-trigger UI render when complete
                            }).catch(() => {
                                window.ytMetadataCache[vidId] = {
                                    id: vidId,
                                    title: link.textContent || 'YouTube Video',
                                    channel: 'YouTube',
                                    thumbnail: `https://img.youtube.com/vi/${vidId}/hqdefault.jpg`,
                                    description: `Click to play this video directly in the side player seamlessly without leaving the chat.`,
                                    url: link.href,
                                    loaded: true
                                };
                                updateYouTubeContainer(ytContainer, contentNode, apiVideos);
                            });
                    }
                }
            });

            if (videoMap.size === 0) {
                ytContainer.innerHTML = '';
                return;
            }

            // 3. Render the Gemini-Style Attachment Block at the Bottom
            let html = `
                <div class="mt-5 bg-[#1f1f1f] rounded-xl overflow-hidden border border-[#333] shadow-sm w-full max-w-3xl">
                    <div class="px-4 py-3 bg-[#282828] border-b border-[#333] flex items-center gap-2">
                        <svg class="w-4 h-4 text-[#ff0000]" fill="currentColor" viewBox="0 0 24 24"><path d="M19.615 3.184c-3.604-.246-11.631-.245-15.23 0-3.897.266-4.356 2.62-4.385 8.816.029 6.185.484 8.549 4.385 8.816 3.6.245 11.626.246 15.23 0 3.897-.266 4.356-2.62 4.385-8.816-.029-6.185-.484-8.549-4.385-8.816zm-10.615 12.816v-8l8 3.993-8 4.007z"/></svg>
                        <span class="text-[13px] font-semibold text-gray-200 tracking-wide">YouTube</span>
                    </div>
                    <div class="flex flex-col">
            `;

            for (const [vidId, vid] of videoMap.entries()) {
                if (!vid.loaded) {
                    // Skeleton loader matches card geometry to prevent layout jumping
                    html += `
                        <div class="flex flex-col sm:flex-row gap-4 p-4 border-b border-[#333] last:border-b-0 animate-pulse">
                            <div class="w-full sm:w-[200px] aspect-video bg-[#2a2a2a] rounded-xl shrink-0"></div>
                            <div class="flex-1 py-1 space-y-3">
                                <div class="h-4 bg-[#2a2a2a] rounded w-3/4"></div>
                                <div class="h-3 bg-[#2a2a2a] rounded w-1/4"></div>
                            </div>
                        </div>
                    `;
                } else {
                    const safeTitle = (vid.title || '').replace(/'/g, "\\'");
                    const safeChannel = (vid.channel || '').replace(/'/g, "\\'");
                    
                    // FIXED: Isolated hover using named group (group/yt) to prevent chat wrapper bleed
                    html += `
                        <div class="flex flex-col sm:flex-row gap-4 p-4 border-b border-[#333] last:border-b-0 hover:bg-[#2a2a2a] cursor-pointer transition-colors group/yt" onclick="openSidePlayer('${vidId}', '${safeTitle}', '${safeChannel}')">
                            <div class="relative w-full sm:w-[200px] aspect-video rounded-xl overflow-hidden shrink-0 bg-black shadow-sm">
                                <img src="${vid.thumbnail}" onerror="this.src='https://img.youtube.com/vi/${vidId}/default.jpg'" class="w-full h-full object-cover opacity-90 group-hover/yt:opacity-100 transition-opacity duration-300">
                                <div class="absolute inset-0 flex items-center justify-center bg-black/10 group-hover/yt:bg-transparent transition-colors">
                                    <div class="w-12 h-8 bg-[#ff0000] rounded-lg flex items-center justify-center shadow-lg group-hover/yt:scale-105 transition-transform">
                                        <svg class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                                    </div>
                                </div>
                            </div>
                            <div class="flex flex-col justify-start overflow-hidden py-0.5">
                                <h4 class="text-[14.5px] font-medium text-gray-100 line-clamp-2 leading-snug group-hover/yt:text-blue-400 transition-colors">${vid.title}</h4>
                                <div class="mt-1.5 flex items-center gap-1.5">
                                    <span class="text-[12px] font-medium text-gray-400 truncate bg-gray-800 border border-gray-700 px-1.5 py-0.5 rounded-sm">${vid.channel}</span>

                                ${vid.description ? `<p class="text-[12.5px] text-gray-400 mt-2 line-clamp-2 leading-relaxed hidden sm:block group-hover/yt:text-gray-300 transition-colors">${vid.description}</p>` : ''}
                            </div>
                        </div>
                    `;
                }
            }

            html += `</div></div>`;
            ytContainer.innerHTML = html;
        }

        function applyMonacoEditors(container) {
            if (!window.monaco || !monacoThemeDefined) return;
            
            const codeBlocks = container.querySelectorAll('pre code');
            codeBlocks.forEach(codeEl => {
                const pre = codeEl.parentElement;
                if (pre.classList.contains('monaco-initialized')) return;
                pre.classList.add('monaco-initialized');

                const code = codeEl.textContent || '';
                let lang = 'plaintext';
                codeEl.classList.forEach(cls => {
                    if (cls.startsWith('language-')) lang = cls.replace('language-', '');
                });

                const langMap = { 'js': 'javascript', 'ts': 'typescript', 'py': 'python', 'sh': 'shell', 'bash': 'shell', 'html': 'html', 'css': 'css', 'json': 'json', 'md': 'markdown', 'c': 'c', 'cpp': 'cpp', 'java': 'java', 'go': 'go', 'rust': 'rust' };
                lang = langMap[lang] || lang;

                const lines = code.trim().split('\n').length;
                const height = Math.min(Math.max(lines * 21 + 30, 100), 450); 

                const wrapperDiv = document.createElement('div');
                wrapperDiv.className = 'relative w-full rounded-xl overflow-hidden my-4 border border-gray-700 bg-[#0d0d0d] shadow-lg';
                
                const headerBar = document.createElement('div');
                headerBar.className = 'flex items-center justify-between px-4 py-1.5 bg-[#212121] border-b border-gray-700';
                headerBar.innerHTML = `<span class="text-xs font-mono text-gray-400 capitalize">${lang}</span>`;

                const actionsDiv = document.createElement('div');
                actionsDiv.className = 'flex items-center gap-3';

                let editorInstance = null;
                let iframe = null;

                if (lang === 'html') {
                    const previewBtn = document.createElement('button');
                    previewBtn.className = 'flex items-center gap-1.5 text-xs text-gray-400 hover:text-gray-100 transition-colors py-1';
                    previewBtn.innerHTML = `<svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg> Preview`;
                    
                    iframe = document.createElement('iframe');
                    iframe.style.width = '100%';
                    iframe.style.height = height + 'px';
                    iframe.style.display = 'none';
                    iframe.style.backgroundColor = '#ffffff'; 
                    iframe.style.border = 'none';
                    iframe.sandbox = 'allow-scripts allow-modals'; 
                    
                    let isPreviewing = false;
                    previewBtn.onclick = () => {
                        isPreviewing = !isPreviewing;
                        if (isPreviewing) {
                            iframe.srcdoc = editorInstance.getValue();
                            monacoDiv.style.display = 'none';
                            iframe.style.display = 'block';
                            previewBtn.innerHTML = `<svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path></svg> Code`;
                        } else {
                            monacoDiv.style.display = 'block';
                            iframe.style.display = 'none';
                            previewBtn.innerHTML = `<svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg> Preview`;
                        }
                    };
                    actionsDiv.appendChild(previewBtn);
                }

                const copyBtn = document.createElement('button');
                copyBtn.className = 'flex items-center gap-1.5 text-xs text-gray-400 hover:text-gray-100 transition-colors py-1';
                copyBtn.innerHTML = `<svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg> Copy code`;
                
                actionsDiv.appendChild(copyBtn);
                headerBar.appendChild(actionsDiv);
                
                const monacoDiv = document.createElement('div');
                monacoDiv.style.height = height + 'px';
                monacoDiv.style.width = '100%';

                wrapperDiv.appendChild(headerBar);
                wrapperDiv.appendChild(monacoDiv);
                if (iframe) wrapperDiv.appendChild(iframe);
                pre.parentNode.replaceChild(wrapperDiv, pre);

                editorInstance = monaco.editor.create(monacoDiv, {
                    value: code.trim(),
                    language: lang,
                    theme: 'modern-dark',
                    readOnly: true,
                    minimap: { enabled: false },
                    scrollBeyondLastLine: false,
                    automaticLayout: true,
                    fontSize: 14,

                    padding: { top: 16, bottom: 16 }

                copyBtn.onclick = () => {

                    copyBtn.innerHTML = `<svg class="w-3.5 h-3.5 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg> <span class="text-emerald-400">Copied!</span>`;
                    setTimeout(() => { copyBtn.innerHTML = originalHtml; }, 2000);
                };
            });
        }

    <!-- Main Application Logic -->
    <script>
        let messageHistory = JSON.parse(localStorage.getItem('chatHistory')) || [];
        let selectedFiles = []; 
        let isGenerating = false;
        let isRegeneratingFlag = false; // Flag for Smart Regeneration Prompt Injection
        let isEditingFlag = false; // Flag for Smart Edit Prompt Injection
        let abortController = null; // Controller for Aborting requests

        // Speech Recognition Setup
        let speechRecognition = null;
        let isRecording = false;
        let transcriptBase = ''; // Anchor to prevent interim result echo duplication

        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
            speechRecognition = new SpeechRec();
            speechRecognition.continuous = true;
            speechRecognition.interimResults = true;
            
            speechRecognition.onresult = (event) => {
                let interimTranscript = '';
                
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) {
                        // Append to base ONLY when final
                        transcriptBase += event.results[i][0].transcript;
                    } else {
                        // Hold interim guess temporarily
                        interimTranscript += event.results[i][0].transcript;
                    }
                }
                
                const input = document.getElementById('messageInput');
                // Reconstruct exactly what it should be (Base + current live guess)
                input.value = transcriptBase + interimTranscript;
                input.dispatchEvent(new Event('input')); // Trigger resize and state updates
                input.scrollTop = input.scrollHeight;
            };

            speechRecognition.onerror = (event) => {
                console.error("Speech recognition error", event.error);
                stopMicrophone();
                if(event.error !== 'no-speech') showToast("Microphone error: " + event.error);
            };

            speechRecognition.onend = () => {
                if (isRecording) {
                    // Auto-restart if browser stops it temporarily (unless user clicked stop)
                    speechRecognition.start();
                }
            };
        } else {
            // Hide mic button if unsupported
            document.getElementById('micBtn').style.display = 'none';
        }

        function toggleMicrophone() {
            const micBtn = document.getElementById('micBtn');
            if (isRecording) {
                stopMicrophone();
            } else {
                if(speechRecognition) {
                    isRecording = true;
                    
                    // Capture whatever is already typed into the input before starting mic
                    const input = document.getElementById('messageInput');
                    transcriptBase = input.value;
                    if (transcriptBase.length > 0 && !transcriptBase.endsWith(' ')) {
                        transcriptBase += ' '; // Add space for natural sentence flow
                    }

                    speechRecognition.start();
                    micBtn.classList.add('mic-recording');
                    micBtn.classList.remove('text-gray-400');
                } else {
                    showToast("Speech recognition not supported in this browser.");
                }
            }
        }

        function stopMicrophone() {
            if (speechRecognition && isRecording) {
                isRecording = false;
                speechRecognition.stop();
                const micBtn = document.getElementById('micBtn');
                micBtn.classList.remove('mic-recording');
                micBtn.classList.add('text-gray-400');
            }
        }


        // Side Player Panel Controls

        function openImageModal(url, title) {
            const modal = document.getElementById('fullscreenModal');
            const img = document.getElementById('fullscreenImage');
            const downloadBtn = document.getElementById('downloadModalBtn');
            
            img.src = url;
            
            downloadBtn.onclick = async () => {
                try {
                    const response = await fetch(url);
                    const blob = await response.blob();
                    const blobUrl = window.URL.createObjectURL(blob);
                    
                    const a = document.createElement('a');
                    a.style.display = 'none';
                    a.href = blobUrl;
                    
                    const safeTitle = (title || 'generated-image').replace(/[^a-z0-9]/gi, '_').toLowerCase();
                    a.download = `${safeTitle}.jpg`;
                    
                    document.body.appendChild(a);
                    a.click();
                    
                    window.URL.revokeObjectURL(blobUrl);
                    a.remove();
                } catch (error) {
                    const a = document.createElement('a');
                    a.href = url;
                    a.target = '_blank';
                    a.download = title || 'image.jpg';
                    document.body.appendChild(a);
                    a.click();
                    a.remove();
                }
            };
            
            modal.classList.remove('hidden');
            modal.classList.add('flex'); 
            void modal.offsetWidth;
            
            modal.classList.remove('opacity-0');
            img.classList.remove('scale-95');
            img.classList.add('scale-100');
        }

        function closeImageModal() {
            const modal = document.getElementById('fullscreenModal');
            const img = document.getElementById('fullscreenImage');
            
            modal.classList.add('opacity-0');
            img.classList.remove('scale-100');
            img.classList.add('scale-95');
            
            setTimeout(() => {
                modal.classList.add('hidden');
                modal.classList.remove('flex'); 
                img.src = '';
            }, 300);
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                const modal = document.getElementById('fullscreenModal');
                if (!modal.classList.contains('hidden')) {
                    closeImageModal();
                }
            }
        });

        window.carouselState = {};
        window.moveCarousel = function(id, dir, total) {
            if (typeof window.carouselState[id] === 'undefined') window.carouselState[id] = 0;
            let current = window.carouselState[id];
            current += dir;
            if (current < 0) current = total - 1;
            if (current >= total) current = 0;
            window.carouselState[id] = current;
            
            document.getElementById(id + '-track').style.transform = `translateX(-${current * 100}%)`;
            
            for(let i = 0; i < total; i++) {
                const dot = document.getElementById(id + '-dot-' + i);
                if (dot) dot.className = `w-2 h-2 rounded-full transition-colors shadow ${i === current ? 'bg-white' : 'bg-white/40'}`;
            }
        };

        const apiUrlInput = document.getElementById('apiUrl');
        const apiKeyInput = document.getElementById('apiKey');
        const systemPromptInput = document.getElementById('systemPrompt');
        const modelSelect = document.getElementById('modelSelect');
        const streamToggle = document.getElementById('streamToggle');
        const chatBox = document.getElementById('chatBox');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const emptyState = document.getElementById('emptyState');
        const sidebar = document.getElementById('sidebar');
        const mobileOverlay = document.getElementById('mobileOverlay');

        window.onload = () => {
            apiUrlInput.value = localStorage.getItem('apiUrl') || 'http://localhost:8000';
            apiKeyInput.value = localStorage.getItem('apiKey') || '';
            systemPromptInput.value = localStorage.getItem('systemPrompt') || '';
            streamToggle.checked = localStorage.getItem('streamEnabled') !== 'false';
            
            const cachedModels = JSON.parse(localStorage.getItem('cachedModels')) || [];
            if (cachedModels.length > 0) populateModelDropdown(cachedModels, localStorage.getItem('selectedModel'));
            if (apiKeyInput.value) fetchModels(true); 
            
            renderChat();
        };

        apiUrlInput.addEventListener('input', () => localStorage.setItem('apiUrl', apiUrlInput.value));
        apiKeyInput.addEventListener('input', () => localStorage.setItem('apiKey', apiKeyInput.value));
        systemPromptInput.addEventListener('input', () => localStorage.setItem('systemPrompt', systemPromptInput.value));
        modelSelect.addEventListener('change', () => localStorage.setItem('selectedModel', modelSelect.value));
        streamToggle.addEventListener('change', () => localStorage.setItem('streamEnabled', streamToggle.checked));

        messageInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 192) + 'px'; 
            if(this.value.trim() === '') this.style.height = 'auto';
            updateSendButtonState();
        });

        messageInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                // Check if button is disabled specifically because of empty content. 
                // If it's generating, we want to allow stopping it, but pressing enter to stop might be weird. Let's just allow click for stop.
                if (!isGenerating && (this.value.trim() !== '' || selectedFiles.length > 0)) {
                    handleSendAction();
                }
            }
        });

        function updateSendButtonState() {
            const hasContent = messageInput.value.trim() !== '' || selectedFiles.length > 0;
            // Ensure button is clickable if we are generating (to stop it), or if there is content.
            if (isGenerating) {
                sendBtn.disabled = false;
            } else {
                sendBtn.disabled = !hasContent;
            }
        }

        function toggleSidebar() {
            sidebar.classList.toggle('-translate-x-full');
            mobileOverlay.classList.toggle('hidden');
        }

        function handleFileUpload(event) {
            const files = Array.from(event.target.files);
            if (files.length === 0) return;

            files.forEach(file => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const dataUrl = e.target.result;
                    const isImage = file.type.startsWith('image/');
                    
                    if (isImage) {
                        const img = new Image();
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            const ctx = canvas.getContext('2d');
                            const MAX_DIM = 800;
                            let { width, height } = img;

                            if (width > height && width > MAX_DIM) { height *= MAX_DIM / width; width = MAX_DIM; }
                            else if (height > MAX_DIM) { width *= MAX_DIM / height; height = MAX_DIM; }
                            
                            canvas.width = width; canvas.height = height;
                            ctx.drawImage(img, 0, 0, width, height);

                            selectedFiles.push({ name: file.name, url: canvas.toDataURL('image/jpeg', 0.85), isImage: true });
                            renderAttachmentsPreview();
                        };
                        img.src = dataUrl;
                    } else {
                        selectedFiles.push({ name: file.name, url: dataUrl, isImage: false });
                        renderAttachmentsPreview();
                    }
                };
                reader.readAsDataURL(file);
            });
            event.target.value = ''; 
        }

        function renderAttachmentsPreview() {
            const container = document.getElementById('attachmentsPreview');
            if (selectedFiles.length === 0) {
                container.classList.add('hidden');
                updateSendButtonState();
                return;
            }
            
            container.classList.remove('hidden');
            container.innerHTML = '';
            
            selectedFiles.forEach((file, index) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'relative group shrink-0';
                
                if (file.isImage) {
                    wrapper.innerHTML = `<img src="${file.url}" class="h-16 w-16 object-cover rounded-lg border border-gray-700">`;
                } else {
                    const ext = (file.name.split('.').pop() || 'FILE').toUpperCase();
                    wrapper.innerHTML = `
                        <div class="h-16 w-16 rounded-lg border border-gray-700 bg-gray-900 flex flex-col items-center justify-center p-1" title="${file.name}">
                            <svg class="w-6 h-6 text-gray-400 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
                            <span class="text-[9px] text-gray-300 font-mono truncate w-full text-center px-1">${ext}</span>
                        </div>
                    `;
                }
                
                wrapper.innerHTML += `
                    <button type="button" onclick="removeAttachment(${index})" class="absolute -top-2 -right-2 bg-gray-900 hover:bg-gray-700 text-white rounded-full p-1 shadow-md transition-all opacity-0 group-hover:opacity-100 scale-90 group-hover:scale-100 border border-gray-600">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                `;
                container.appendChild(wrapper);
            });
            updateSendButtonState();
        }

        function removeAttachment(index) {
            selectedFiles.splice(index, 1);
            renderAttachmentsPreview();
        }

        function saveChatState() {
            if (messageHistory.length > 50) messageHistory = messageHistory.slice(-50);
            try { localStorage.setItem('chatHistory', JSON.stringify(messageHistory)); } 
            catch (e) { messageHistory = messageHistory.slice(-15); localStorage.setItem('chatHistory', JSON.stringify(messageHistory)); }
        }

        function showToast(message, type = 'error') {
            const toast = document.getElementById('toast');
            document.getElementById('toastMessage').textContent = message;
            const icon = document.getElementById('toastIcon');
            
            icon.className = `w-2 h-2 rounded-full ${type === 'error' ? 'bg-red-500 shadow-[0_0_8px_rgba(239,68,68,0.8)]' : 'bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.8)]'}`;
            
            toast.classList.remove('-translate-y-20', 'opacity-0');
            toast.classList.add('translate-y-0', 'opacity-100');
            setTimeout(() => {
                toast.classList.add('-translate-y-20', 'opacity-0');
                toast.classList.remove('translate-y-0', 'opacity-100');
            }, 3000);
        }

        function populateModelDropdown(models, savedModel) {
            modelSelect.innerHTML = '';
            if (models.length === 0) {
                modelSelect.innerHTML = '<option value="">No models</option>';
                modelSelect.disabled = true;
                return;
            }
            models.forEach(model => {
                const opt = document.createElement('option');
                opt.value = model.id; opt.textContent = model.id;
                modelSelect.appendChild(opt);
            });
            modelSelect.disabled = false;
            
            if (savedModel && Array.from(modelSelect.options).some(o => o.value === savedModel)) {
                modelSelect.value = savedModel;
            } else {
                modelSelect.value = models[0].id;
                localStorage.setItem('selectedModel', models[0].id);
            }
        }

        async function fetchModels(silent = false) {
            const topBtn = document.getElementById('fetchBtnTop');
            const baseUrl = apiUrlInput.value.replace(/\/+$/, '');
            const apiKey = apiKeyInput.value.trim();

            if (!apiKey) return silent ? null : showToast("API Key is required");

            if (topBtn) topBtn.classList.add('animate-spin');
            
            try {
                const response = await fetch(`${baseUrl}/v1/models`, { headers: { 'Authorization': `Bearer ${apiKey}` } });
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                const data = await response.json();
                
                localStorage.setItem('cachedModels', JSON.stringify(data.data));
                populateModelDropdown(data.data, localStorage.getItem('selectedModel'));
                if (!silent) showToast("Models updated", 'success');
            } catch (error) {
                if (!silent) showToast(error.message.includes("Failed to fetch") ? "Network Error" : error.message);
            } finally {
                if (topBtn) topBtn.classList.remove('animate-spin');
            }
        }

        function extractTextFromMsg(msg) {
            if (typeof msg.content === 'string') return msg.content;
            if (Array.isArray(msg.content)) {
                return msg.content.find(c => c.type === 'text')?.text || '';
            }
            return '';
        }

        function copyMessageIndex(index, btn) {
            const text = extractTextFromMsg(messageHistory[index]);
            fallbackCopyTextToClipboard(text);
            
            const orig = btn.innerHTML;
            btn.innerHTML = `<svg class="w-4 h-4 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>`;
            setTimeout(() => btn.innerHTML = orig, 2000);
        }

        function replyToMessage(index) {
            if (isGenerating) return;
            const text = extractTextFromMsg(messageHistory[index]);
            const quote = text.split('\n').map(line => `> ${line}`).join('\n');
            messageInput.value = `${quote}\n\n`;
            messageInput.dispatchEvent(new Event('input')); 
            messageInput.focus();
        }

        async function regenerateResponse() {
            if (isGenerating || messageHistory.length < 2) return;
            if (messageHistory[messageHistory.length - 1].role === 'assistant') {
                messageHistory.pop();
            }
            isRegeneratingFlag = true;
            await triggerGenerationStream();
        }

        function showEditUI(index) {
            if (isGenerating) return;
            const wrapper = document.getElementById(`msg-wrapper-${index}`);
            const bubble = wrapper.querySelector('.user-bubble-content');
            const actionBar = wrapper.querySelector('.user-action-bar');
            
            const text = extractTextFromMsg(messageHistory[index]);
            
            actionBar.style.display = 'none';
            bubble.classList.remove('px-5', 'py-3', 'bg-gray-800');
            bubble.classList.add('p-0', 'bg-transparent', 'w-full');
            
            bubble.innerHTML = `
                <textarea id="edit-textarea-${index}" class="w-full bg-[#111] border border-gray-600 rounded-xl p-3 text-sm text-gray-100 focus:outline-none focus:border-brand-500 resize-none min-h-[100px] mb-2">${text}</textarea>
                <div class="flex justify-end gap-2">
                    <button onclick="renderChat()" class="px-4 py-1.5 text-sm font-medium bg-gray-700 hover:bg-gray-600 text-gray-200 rounded-lg transition-colors">Cancel</button>
                    <button onclick="submitEdit(${index})" class="px-4 py-1.5 text-sm font-medium bg-white hover:bg-gray-200 text-gray-900 rounded-lg transition-colors">Save & Submit</button>
                </div>
            `;
            
            const textarea = document.getElementById(`edit-textarea-${index}`);
            textarea.focus();
            textarea.setSelectionRange(textarea.value.length, textarea.value.length);
            
            textarea.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = Math.min(this.scrollHeight, 300) + 'px';
            });
            textarea.dispatchEvent(new Event('input'));
        }

        async function submitEdit(index) {
            const textarea = document.getElementById(`edit-textarea-${index}`);
            const newText = textarea.value.trim();
            
            if (!newText) { renderChat(); return; }

            let msg = messageHistory[index];
            if (Array.isArray(msg.content)) {
                let textItem = msg.content.find(c => c.type === 'text');
                if(textItem) textItem.text = newText;
                else msg.content.push({type: 'text', text: newText});
            } else {
                messageHistory[index].content = newText;
            }
            
            messageHistory = messageHistory.slice(0, index + 1);
            saveChatState();
            
            isEditingFlag = true;
            await triggerGenerationStream();
        }

        function createBubbleNode(role, isLastAI = false, index = -1) {
            const wrapper = document.createElement('div');
            wrapper.id = `msg-wrapper-${index}`;
            // FIXED: Added named group `group/msg` to prevent hover effect bleed!
            wrapper.className = `w-full flex justify-center py-5 ${role === 'user' ? 'px-4 group/msg' : 'px-4 group/msg'}`;

            const container = document.createElement('div');
            container.className = `w-full max-w-3xl flex gap-4 md:gap-6 ${role === 'user' ? 'justify-end' : ''}`;
            
            if (role === 'user') {
                const contentCol = document.createElement('div');
                contentCol.className = 'flex flex-col items-end w-full max-w-[85%] md:max-w-[75%]';
                
                const bubble = document.createElement('div');
                bubble.className = 'user-bubble-content bg-gray-800 text-gray-100 rounded-3xl px-5 py-3 shadow-sm whitespace-pre-wrap w-fit break-words';
                
                const actionBar = document.createElement('div');
                // FIXED: Now specifically triggers only when the parent group/msg is hovered
                actionBar.className = 'user-action-bar mt-1.5 flex items-center gap-1 opacity-0 group-hover/msg:opacity-100 transition-opacity duration-200 pr-3';
                actionBar.innerHTML = `
                    <button onclick="showEditUI(${index})" class="p-1.5 text-gray-400 hover:text-gray-200 hover:bg-gray-800 rounded-md transition-colors" title="Edit">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                    </button>
                    <button onclick="copyMessageIndex(${index}, this)" class="p-1.5 text-gray-400 hover:text-gray-200 hover:bg-gray-800 rounded-md transition-colors" title="Copy">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                    </button>
                `;

                contentCol.appendChild(bubble);
                contentCol.appendChild(actionBar);
                container.appendChild(contentCol);
                wrapper.appendChild(container);
                
                return { wrapper, contentNode: bubble, actionBar };
            } else {
                const avatar = document.createElement('div');
                avatar.className = `w-8 h-8 rounded-full flex-shrink-0 flex items-center justify-center bg-white mt-1 shadow-sm`;
                avatar.innerHTML = `<svg class="w-5 h-5 text-gray-900" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-1-12h2v6h-2zm0 8h2v2h-2z"/></svg>`;
                
                const contentCol = document.createElement('div');
                contentCol.className = 'flex-1 min-w-0';
                
                const bubble = document.createElement('div');
                bubble.className = 'markdown-body pt-1';
                
                const youtubeContainer = document.createElement('div');
                youtubeContainer.className = 'youtube-attachments-container w-full empty:hidden';

                const actionBar = document.createElement('div');
                // FIXED: Isolated action bar hover
                actionBar.className = 'mt-2 flex items-center gap-1 opacity-0 group-hover/msg:opacity-100 transition-opacity duration-200';
                
                let actionsHTML = `
                    <button onclick="copyMessageIndex(${index}, this)" class="p-1.5 text-gray-400 hover:text-gray-200 hover:bg-gray-800 rounded-md transition-colors" title="Copy"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg></button>
                    <button onclick="replyToMessage(${index})" class="p-1.5 text-gray-400 hover:text-gray-200 hover:bg-gray-800 rounded-md transition-colors ml-1" title="Reply"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h10a8 8 0 018 8v2M3 10l6 6m-6-6l6-6"></path></svg></button>
                `;
                if (isLastAI) {
                    actionsHTML += `<button onclick="regenerateResponse()" class="p-1.5 text-gray-400 hover:text-gray-200 hover:bg-gray-800 rounded-md transition-colors ml-1" title="Regenerate"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg></button>`;
